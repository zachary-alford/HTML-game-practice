<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-type" contents="text/html; charset=utf-8">
    <title>Sample HTML5 File</title>
    <script type="text/javascript">
      function pageLoaded() {
        alert("Hello World!");
        let canvas = document.getElementById("testcanvas");
        let context = canvas.getContext("2d");

        // Filled Rectanles
        // solid square width and height 100px (200, 10)
        context.fillRect(200, 10, 100, 100);
        // solid square width 90px height 30px (50, 70)
        context.fillRect(50, 70, 90, 30);

        // Stroked Rectangles
        // rectangular outline width and height 50px (110, 10)
        context.strokeRect(110, 10, 50, 50);
        // rectangular outline width and height 50px (30, 10)
        context.strokeRect(30, 10, 50, 50);

        // Clearing Rectangles
        // clear rectangle width 30px height 20px (210, 20)
        context.clearRect(210, 20, 30, 20);
        // clear rectangle width 30px height 20px (260, 20)
        context.clearRect(260, 20, 30, 20);

        // Drawing complex shapes
        // filled triangle
        context.beginPath();
        context.moveTo(10, 120);   // start drawing at 10, 120
        context.lineTo(10, 180);
        context.lineTo(110, 150);
        context.fill();            // close the shape and fill it out

        // stroked triangle
        context.beginPath();
        context.moveTo(140, 160);  // start drawing
        context.lineTo(140, 220);
        context.lineTo(40, 190);
        context.closePath();
        context.stroke();

        // complex set of lines
        context.beginPath();
        context.moveTo(160, 160);  // start drawing
        context.lineTo(170, 220);
        context.lineTo(240, 210);
        context.lineTo(260, 170);
        context.lineTo(190, 140);
        context.closePath();
        context.stroke();
      }
    </script>
  </head>
  <body onload="pageLoaded();">
    <canvas width="640" height="480" id="testcanvas" style="border: 1px solid black;">
      Your browser does not support HTML5 Canvas. Please shift to a newer browser.
    </canvas>
  </body>
</html>
